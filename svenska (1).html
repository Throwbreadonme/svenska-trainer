<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#faf8f4; --surface:#f0ece3; --border:#ddd8cc;
      --text:#2c2825; --muted:#8c8070; --accent:#c0533a;
      --accent2:#4a7c59; --warn:#b85c20;
      --serif:'Lora',Georgia,serif; --sans:'DM Sans',system-ui,sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:16px; line-height:1.6; min-height:100vh; }
    .site-header { border-bottom:1px solid var(--border); padding:18px 0; text-align:center; }
    .site-header a { font-family:var(--serif); font-size:18px; color:var(--text); text-decoration:none; opacity:.7; transition:opacity .2s; }
    .site-header a:hover { opacity:1; }
    .container { max-width:480px; margin:0 auto; padding:0 20px; }
    button { cursor:pointer; font-family:var(--sans); border:none; transition:all .18s ease; }
    button:disabled { cursor:default; opacity:.45; }
    .btn-primary { background:var(--accent); color:#fff; border-radius:8px; padding:13px 20px; font-size:15px; font-weight:500; width:100%; }
    .btn-primary:hover:not(:disabled) { background:#a8432b; }
    .btn-outline { background:transparent; border:1px solid var(--border); border-radius:8px; padding:11px 18px; font-size:14px; color:var(--text); }
    .btn-outline:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
    .btn-ghost { background:none; color:var(--muted); font-size:13px; padding:4px 0; }
    .btn-ghost:hover { color:var(--accent); }
    .card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:24px; }
    .progress-track { background:var(--surface); border-radius:999px; height:5px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--accent); border-radius:999px; transition:width .4s ease; }
    .flip-wrap { perspective:1000px; height:200px; }
    .flip-inner { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .5s cubic-bezier(.45,.05,.55,.95); }
    .flip-inner.flipped { transform:rotateY(180deg); }
    .flip-face { position:absolute; width:100%; height:100%; backface-visibility:hidden; border-radius:12px; border:1px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px; background:#fff; }
    .flip-back { transform:rotateY(180deg); background:var(--surface); border-color:var(--accent); }
    .badge { display:inline-block; padding:2px 10px; border-radius:999px; font-size:11px; letter-spacing:.05em; text-transform:uppercase; border:1px solid currentColor; opacity:.7; }
    .know-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .know-btn { border-radius:10px; padding:14px 10px; font-size:15px; font-weight:500; border:1px solid var(--border); }
    .know-btn.yes { background:#edf7f0; color:var(--accent2); border-color:#b8dfc6; }
    .know-btn.yes:hover { background:#d6f0e0; }
    .know-btn.no  { background:#fdf0ee; color:var(--accent); border-color:#f0c4bb; }
    .know-btn.no:hover  { background:#f9ddd8; }
    .quiz-options { display:flex; flex-direction:column; gap:10px; }
    .quiz-opt { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 18px; font-size:15px; color:var(--text); text-align:left; font-family:var(--sans); transition:all .15s; }
    .quiz-opt:hover:not(:disabled) { border-color:var(--accent); background:#fff5f3; }
    .quiz-opt.correct { background:#edf7f0; border-color:var(--accent2); color:var(--accent2); font-weight:500; }
    .quiz-opt.wrong   { background:#fdf0ee; border-color:var(--accent); color:var(--accent); }
    .type-input { width:100%; border:1px solid var(--border); border-radius:8px; padding:12px 14px; font-family:var(--sans); font-size:15px; background:#fff; color:var(--text); outline:none; transition:border-color .15s; }
    .type-input:focus { border-color:var(--accent); }
    .type-input.correct { border-color:var(--accent2); background:#edf7f0; }
    .type-input.wrong   { border-color:var(--accent); background:#fdf0ee; }
    .ai-hint { background:#fffbf8; border:1px solid #e8ddd4; border-radius:8px; padding:12px 14px; font-size:13.5px; color:var(--text); line-height:1.7; font-style:italic; }
    .stat-tile { background:#fff; border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
    .stat-num  { font-family:var(--serif); font-size:32px; font-weight:600; line-height:1; }
    .stat-label { font-size:11px; color:var(--muted); margin-top:4px; letter-spacing:.08em; text-transform:uppercase; }
    .word-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; }
    .word-row:last-child { border-bottom:none; }
    .word-sv { font-family:var(--serif); font-size:16px; }
    .word-pill { font-size:11px; padding:2px 8px; border-radius:999px; font-weight:500; }
    .pill-correct { background:#edf7f0; color:var(--accent2); }
    .pill-wrong   { background:#fdf0ee; color:var(--accent); }
    .divider { border:none; border-top:1px solid var(--border); margin:0; }
    .hint-text { font-size:12px; color:var(--muted); letter-spacing:.03em; }
    .toggle-btn { width:40px; height:22px; border-radius:999px; border:none; cursor:pointer; transition:background .2s; position:relative; flex-shrink:0; }
    .toggle-btn.on  { background:var(--accent2); }
    .toggle-btn.off { background:var(--border); }
    .toggle-btn::after { content:''; position:absolute; top:3px; width:16px; height:16px; border-radius:50%; background:#fff; transition:left .2s; }
    .toggle-btn.on::after  { left:21px; }
    .toggle-btn.off::after { left:3px; }
    /* Mode selector pills */
    .mode-pills { display:flex; gap:8px; flex-wrap:wrap; }
    .mode-pill { border:1px solid var(--border); border-radius:999px; padding:7px 16px; font-size:13px; background:transparent; color:var(--text); transition:all .15s; }
    .mode-pill.selected { background:var(--accent); border-color:var(--accent); color:#fff; }
    .mode-pill:hover:not(.selected) { border-color:var(--accent); color:var(--accent); }
    /* Deck cards */
    .deck-card { border:1px solid var(--border); border-radius:10px; padding:14px 16px; background:#fff; display:flex; align-items:center; gap:14px; cursor:pointer; transition:all .15s; }
    .deck-card:hover { border-color:var(--accent); }
    .deck-card.selected { border-color:var(--accent); border-width:2px; background:#fff9f8; }
    @keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .fadein { animation:fadein .25s ease forwards; }
    @keyframes pop { from{transform:scale(.95);opacity:0} to{transform:scale(1);opacity:1} }
    .pop { animation:pop .2s ease forwards; }
  </style>

/* ── SM-2 ── */
function sm2(card, q) {
  let { interval, repetitions, easeFactor } = card;
  if (q >= 3) {
    interval = repetitions===0 ? 1 : repetitions===1 ? 6 : Math.round(interval*easeFactor);
    repetitions++;
  } else { repetitions=0; interval=1; }
  easeFactor = Math.max(1.3, easeFactor + 0.1 - (5-q)*(0.08+(5-q)*0.02));
  return { interval, repetitions, easeFactor, nextReview:Date.now()+interval*86400000, lastQuality:q };
}

const STORAGE_KEY = "kelly_v5";
const BATCH = 10;
const A1_UNLOCK_PCT = 80;
const ALL_VOCAB = [...VOCAB_A1, ...VOCAB_A2];

function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; } catch { return null; }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}
function initCards() {
  return ALL_VOCAB.map(w => ({...w, interval:0, repetitions:0, easeFactor:2.5, nextReview:null, totalReviews:0, correctCount:0}));
}
function getSession(cards, wordIds, force=false) {
  const pool = cards.filter(c => wordIds.includes(c.id));
  if (force) {
    // ignore due date, shuffle everything
    return [...pool].sort(() => Math.random()-.5).slice(0, BATCH);
  }
  const due = pool.filter(isDue);
  const reviews = due.filter(c => c.repetitions > 0);
  const fresh = due.filter(c => c.repetitions === 0).slice(0, BATCH);
  const session = [...reviews, ...fresh].slice(0, Math.max(BATCH, reviews.length)).sort(() => Math.random()-.5);
  // if fewer than BATCH due, pad with non-due cards sorted by soonest review
  if (session.length < BATCH) {
    const sessionIds = new Set(session.map(c=>c.id));
    const extra = pool
      .filter(c => !sessionIds.has(c.id) && !isDue(c))
      .sort((a,b) => (a.nextReview||0) - (b.nextReview||0))
      .slice(0, BATCH - session.length);
    return [...session, ...extra];
  }
  return session;
}
function hintText(en) {
  return en.split(" ").map((w,i) => i===0 ? w[0]+"_".repeat(Math.max(0,w.length-1)) : "___").join(" ");
}
function isCorrectTyping(input, card) {
  const inp = input.trim().toLowerCase();
  return [card.en, ...(card.synonyms||[])].map(s=>s.toLowerCase().trim()).some(a=>a===inp);
}

function speakWord(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "sv-SE"; u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

/* ── App ── */
function App() {
  const saved = loadState();

  /* FIX: correct migration — saved card data wins over vocab defaults */
  const [cards, setCards] = useState(() => {
    const vocabMap = Object.fromEntries(ALL_VOCAB.map(w=>[w.id,w]));
    if (saved?.cards) {
      const savedIds = new Set(saved.cards.map(c=>c.id));
      const newWords = ALL_VOCAB.filter(w=>!savedIds.has(w.id))
        .map(w=>({...w, interval:0, repetitions:0, easeFactor:2.5, nextReview:null, totalReviews:0, correctCount:0}));
      // vocab fields first, then saved card fields on top (preserves repetitions, correctCount etc.)
      return [
        ...saved.cards.map(c=>({...vocabMap[c.id]||c, ...c})),
        ...newWords
      ];
    }
    return initCards();
  });

  const [enabledIds, setEnabledIds] = useState(() => saved?.enabledIds || ALL_VOCAB.map(w=>w.id));
  const [a2ForceUnlocked, setA2ForceUnlocked] = useState(() => saved?.a2ForceUnlocked || false);
  const [screen, setScreen] = useState("home");
  const [activeLevel, setActiveLevel] = useState(1);
  const [selectedDeckId, setSelectedDeckId] = useState(null);
  const [mode, setMode] = useState("flashcard");
  const [session, setSession] = useState([]);
  const [sessionLog, setSessionLog] = useState([]);
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [quizOpts, setQuizOpts] = useState([]);
  const [quizAnswer, setQuizAnswer] = useState(null);
  const [typeVal, setTypeVal] = useState("");
  const [typeResult, setTypeResult] = useState(null);
  const [showHint, setShowHint] = useState(false);
  const [sessionStats, setSessionStats] = useState({correct:0, wrong:0});
  const [doneMsg] = useState(() => DONE_MESSAGES[Math.floor(Math.random()*DONE_MESSAGES.length)]);
  const [aiText, setAiText] = useState("");
  const [finalCards, setFinalCards] = useState(null);
  const [lastDeckIds, setLastDeckIds] = useState([]);
  const [pickerSearch, setPickerSearch] = useState("");
  const [infoTip, setInfoTip] = useState(null); // which tile is showing tooltip
  const inputRef = useRef(null);

  useEffect(() => { saveState({cards, enabledIds, a2ForceUnlocked}); }, [cards, enabledIds, a2ForceUnlocked]);

  const a1Cards = cards.filter(c=>c.cefr===1);
  const a1Learned = a1Cards.filter(c=>c.repetitions>=2).length;
  const a1Pct = Math.round((a1Learned/a1Cards.length)*100);
  const a2Unlocked = a1Pct >= A1_UNLOCK_PCT || a2ForceUnlocked;

  const makeOpts = useCallback((card, allCards) => {
    let distractors = DISTRACTORS[card.id];
    if (!distractors || distractors.length < 2) {
      distractors = allCards.filter(c=>c.id!==card.id&&c.pos===card.pos).sort(()=>Math.random()-.5).slice(0,2).map(c=>c.en);
      if (distractors.length < 2) {
        const extra = allCards.filter(c=>c.id!==card.id&&!distractors.includes(c.en)).sort(()=>Math.random()-.5).slice(0,2-distractors.length).map(c=>c.en);
        distractors = [...distractors,...extra];
      }
    }
    setQuizOpts([...distractors.slice(0,2), card.en].sort(()=>Math.random()-.5));
    setQuizAnswer(null);
  }, []);

  const startSession = useCallback((m, wordIds, force=false) => {
    const s = getSession(cards, wordIds, force);
    if (s.length === 0) return;
    setSession(s); setSessionLog([]); setIdx(0); setMode(m);
    setFlipped(false); setQuizAnswer(null); setTypeVal(""); setTypeResult(null); setShowHint(false);
    setSessionStats({correct:0, wrong:0}); setAiText(""); setFinalCards(null);
    setLastDeckIds(wordIds);
    setScreen("study");
    if (m==="quiz" && s.length>0) makeOpts(s[0], cards);
  }, [cards, makeOpts]);

  useEffect(() => {
    if (screen==="study" && session[idx] && (mode==="flashcard"||mode==="quiz")) {
      speakWord(session[idx].sv);
    }
  }, [idx, screen, mode]);

  const current = session[idx];

  function applyQ(q) {
    const correct = q >= 3;
    const updated = sm2({...current}, q);
    const newCards = cards.map(c => c.id===current.id
      ? {...c, ...updated, totalReviews:c.totalReviews+1, correctCount:c.correctCount+(correct?1:0)}
      : c);
    setCards(newCards);
    setSessionStats(s => ({correct:s.correct+(correct?1:0), wrong:s.wrong+(correct?0:1)}));
    setSessionLog(log => [...log, {sv:current.sv, en:current.en, correct}]);
    const nextIdx = idx+1;
    setFlipped(false); setQuizAnswer(null); setTypeVal(""); setTypeResult(null); setShowHint(false); setAiText("");
    if (nextIdx >= session.length) {
      setFinalCards(newCards); // save newCards so done screen reads fresh data
      setScreen("done");
    } else {
      setIdx(nextIdx);
      if (mode==="quiz") makeOpts(session[nextIdx], newCards);
    }
  }

  function handleType() {
    if (!current || typeResult) return;
    const ok = isCorrectTyping(typeVal, current);
    setTypeResult(ok ? "correct" : "wrong");
    /* FIX: typing is harder effort — reward with quality 5 when correct */
    setTimeout(() => applyQ(ok ? 5 : 1), 900);
  }

  function loadAi() {
    if (!current) return;
    const ex = current.example || "No example available.";
    setAiText(ex);
    const svPart = ex.split(" — ")[0];
    if (svPart) speakWord(svPart);
  }

  const levelCards = (lv) => cards.filter(c=>c.cefr===lv);
  const levelLearned = (lv) => levelCards(lv).filter(c=>c.repetitions>=2).length;
  const levelDue = (lv, ids) => levelCards(lv).filter(c=>(ids||enabledIds).includes(c.id)&&isDue(c)).length;

  const total = cards.length;
  const reviewed = cards.filter(c=>c.totalReviews>0).length;
  const learned = cards.filter(c=>c.repetitions>=2).length;
  const mastered = cards.filter(c=>c.repetitions>=5).length;
  const dueCount = cards.filter(c=>enabledIds.includes(c.id)&&isDue(c)).length;
  const pct = Math.round((reviewed/total)*100);

  /* ────── HOME ────── */
  if (screen==="home") return (
    <div className="container fadein" style={{paddingTop:48, paddingBottom:72, display:"flex", flexDirection:"column", gap:28}}>
      <div>
        <p style={{fontFamily:"var(--serif)", fontSize:13, color:"var(--muted)", marginBottom:6, fontStyle:"italic"}}>Kelly Corpus · CEFR</p>
        <h1 style={{fontFamily:"var(--serif)", fontSize:40, fontWeight:600}}>Svenska</h1>
        <p style={{color:"var(--muted)", marginTop:6, fontSize:15}}>Swedish vocabulary with spaced repetition</p>
      </div>

      <div>
        <div style={{display:"flex", justifyContent:"space-between", fontSize:13, color:"var(--muted)", marginBottom:6}}>
          <span>Words reviewed</span><span>{reviewed} / {total}</span>
        </div>
        <div className="progress-track"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
      </div>

      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
        {[
          {l:"Due today",  v:dueCount, c:"var(--accent)",  tip:"Words scheduled for review today based on the spaced repetition algorithm."},
          {l:"Reviewed",   v:reviewed, c:"var(--text)",    tip:"Words you have seen at least once across all sessions."},
          {l:"Learned",    v:learned,  c:"var(--accent2)", tip:"Words you have answered correctly in 2 or more separate sessions. They are starting to stick!"},
          {l:"Mastered",   v:mastered, c:"var(--muted)",   tip:"Words you have answered correctly in 5 or more sessions. These are solidly in your long-term memory."},
        ].map(({l,v,c,tip})=>(
          <div className="stat-tile" key={l} style={{position:"relative"}}>
            <button onClick={()=>setInfoTip(infoTip===l?null:l)}
              style={{position:"absolute",top:8,right:10,background:"none",color:"var(--muted)",fontSize:13,padding:0,lineHeight:1,cursor:"pointer",border:"1px solid var(--border)",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center"}}>
              i
            </button>
            {infoTip===l && (
              <div style={{position:"absolute",top:30,left:0,right:0,zIndex:10,background:"#fff",border:"1px solid var(--border)",borderRadius:8,padding:"10px 12px",fontSize:12,color:"var(--text)",lineHeight:1.5,boxShadow:"0 4px 12px rgba(0,0,0,0.08)"}}>
                {tip}
              </div>
            )}
            <div className="stat-num" style={{color:c, fontSize:26}}>{v}</div>
            <div className="stat-label">{l}</div>
          </div>
        ))}
      </div>

      <div style={{display:"flex", flexDirection:"column", gap:12}}>
        <p style={{fontSize:12, color:"var(--muted)", letterSpacing:".08em", textTransform:"uppercase"}}>Choose a level</p>
        {/* A1 */}
        <button className="btn-outline" onClick={()=>{setActiveLevel(1);setSelectedDeckId(null);setScreen("level");}}
          style={{display:"flex", alignItems:"center", gap:16, padding:"16px 18px", textAlign:"left"}}>
          <div style={{background:"var(--accent)", color:"#fff", borderRadius:8, padding:"6px 12px", fontWeight:600, fontSize:13, flexShrink:0}}>A1</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:500, fontSize:15}}>Beginner</div>
            <div style={{fontSize:12, color:"var(--muted)", marginTop:2}}>{levelLearned(1)}/{VOCAB_A1.length} learned · {levelDue(1)} due today</div>
          </div>
          <span style={{color:"var(--accent)", fontSize:16}}>→</span>
        </button>

        {/* A2 */}
        <button className="btn-outline" onClick={()=>{if(a2Unlocked){setActiveLevel(2);setSelectedDeckId(null);setScreen("level");}}}
          disabled={false}
          style={{display:"flex", alignItems:"center", gap:16, padding:"16px 18px", textAlign:"left", opacity:a2Unlocked?1:0.7}}>
          <div style={{background:a2Unlocked?"var(--accent2)":"var(--muted)", color:"#fff", borderRadius:8, padding:"6px 12px", fontWeight:600, fontSize:13, flexShrink:0}}>A2</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:500, fontSize:15}}>Elementary {!a2Unlocked && "🔒"}</div>
            {a2Unlocked
              ? <div style={{fontSize:12, color:"var(--muted)", marginTop:2}}>{levelLearned(2)}/{VOCAB_A2.length} learned · {levelDue(2)} due today</div>
              : <div style={{fontSize:12, color:"var(--muted)", marginTop:2}}>Recommended at {A1_UNLOCK_PCT}% A1 · you're at {a1Pct}%</div>
            }
          </div>
          {!a2Unlocked
            ? <button onClick={e=>{e.stopPropagation();setA2ForceUnlocked(true);setActiveLevel(2);setSelectedDeckId(null);setScreen("level");}}
                style={{background:"none", border:"1px solid var(--border)", borderRadius:6, padding:"4px 10px", fontSize:11, color:"var(--muted)", cursor:"pointer", flexShrink:0}}>
                Unlock anyway
              </button>
            : <span style={{color:"var(--accent2)", fontSize:16}}>→</span>
          }
        </button>

      </div>

      <hr className="divider"/>
      <div style={{display:"flex", justifyContent:"space-between"}}>
        <button className="btn-ghost" onClick={()=>setScreen("stats")}>Statistics →</button>
        <button className="btn-ghost" style={{color:"var(--border)"}}
          onClick={()=>{if(window.confirm("Reset all progress?")) { setCards(initCards()); setA2ForceUnlocked(false); }}}>Reset</button>
      </div>
    </div>
  );

  /* ────── LEVEL SCREEN ────── */
  if (screen==="level") {
    const lvVocab = activeLevel===1 ? VOCAB_A1 : VOCAB_A2;
    const lvDecks = activeLevel===1 ? DECKS_A1 : DECKS_A2;
    const lvColor = activeLevel===1 ? "var(--accent)" : "var(--accent2)";
    const lvLabel = activeLevel===1 ? "A1 · Beginner" : "A2 · Elementary";
    const selectedDeck = lvDecks.find(d=>d.id===selectedDeckId) || null;
    const deckWordIds = selectedDeck ? selectedDeck.ids.filter(id=>enabledIds.includes(id)) : enabledIds.filter(id=>lvVocab.find(w=>w.id===id));
    const deckDue = cards.filter(c=>deckWordIds.includes(c.id)&&isDue(c)).length;

    return (
      <div className="container fadein" style={{paddingTop:32, paddingBottom:72, display:"flex", flexDirection:"column", gap:24}}>
        <div style={{display:"flex", alignItems:"center", gap:12}}>
          <button className="btn-ghost" onClick={()=>setScreen("home")} style={{fontSize:18, padding:0}}>←</button>
          <div>
            <div style={{fontFamily:"var(--serif)", fontSize:22, fontWeight:600}}>Svenska</div>
            <div style={{fontSize:13, color:"var(--muted)"}}>{lvLabel}</div>
          </div>
        </div>

        {/* Progress */}
        <div className="card">
          <div style={{display:"flex", justifyContent:"space-between", fontSize:13, color:"var(--muted)", marginBottom:8}}>
            <span>Learned</span><span>{levelLearned(activeLevel)} / {lvVocab.length}</span>
          </div>
          <div className="progress-track" style={{height:7}}>
            <div style={{height:"100%", background:lvColor, borderRadius:999, width:`${Math.round(levelLearned(activeLevel)/lvVocab.length*100)}%`, transition:"width .4s ease"}}/>
          </div>
        </div>

        {/* Step 1: pick a deck */}
        <div style={{display:"flex", flexDirection:"column", gap:10}}>
          <p style={{fontSize:12, color:"var(--muted)", letterSpacing:".08em", textTransform:"uppercase"}}>1. Pick a deck</p>
          {lvDecks.map(deck=>{
            const due = cards.filter(c=>deck.ids.includes(c.id)&&isDue(c)).length;
            const isSelected = selectedDeckId===deck.id;
            return (
              <div key={deck.id} className={`deck-card${isSelected?" selected":""}`}
                onClick={()=>setSelectedDeckId(isSelected ? null : deck.id)}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:500, fontSize:14}}>{deck.label}</div>
                  <div style={{fontSize:12, color:"var(--muted)", marginTop:1}}>{deck.desc} · {due} due</div>
                </div>
                <div style={{width:20, height:20, borderRadius:50, border:`2px solid ${isSelected?lvColor:"var(--border)"}`, background:isSelected?lvColor:"transparent", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center"}}>
                  {isSelected && <div style={{width:8, height:8, borderRadius:50, background:"#fff"}}/>}
                </div>
              </div>
            );
          })}
          <button className="btn-outline" onClick={()=>setScreen("wordpicker")}
            style={{display:"flex", alignItems:"center", gap:12, padding:"12px 18px", textAlign:"left", borderColor:lvColor, color:lvColor}}>
            <span style={{fontSize:16}}>✦</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:500, fontSize:14}}>Create your deck</div>
              <div style={{fontSize:12, color:"var(--muted)", marginTop:1}}>Choose exactly which words to practise</div>
            </div>
            <span style={{fontSize:14}}>→</span>
          </button>
        </div>

        {/* Step 2: pick exercise type */}
        <div style={{display:"flex", flexDirection:"column", gap:10}}>
          <p style={{fontSize:12, color:"var(--muted)", letterSpacing:".08em", textTransform:"uppercase"}}>2. Choose exercise type</p>
          <div className="mode-pills">
            {[
              {m:"flashcard", label:"🃏 Flashcards"},
              {m:"quiz",      label:"🎯 Multiple choice"},
              {m:"typing",    label:"⌨️ Type it"},
            ].map(({m,label})=>(
              <button key={m} className={`mode-pill${mode===m?" selected":""}`} onClick={()=>setMode(m)}>{label}</button>
            ))}
          </div>
          <div style={{fontSize:12, color:"var(--muted)", fontStyle:"italic"}}>
            {mode==="flashcard" && "See the word, flip to check, mark what you knew."}
            {mode==="quiz"      && "Pick the right translation from three options."}
            {mode==="typing"    && "Recall the English word from scratch. Tougher but more effective!"}
          </div>
        </div>

        {/* Start button */}
        <button className="btn-primary" style={{background:deckDue>0?lvColor:"var(--muted)"}}
          onClick={()=>startSession(mode, deckWordIds)}
          disabled={deckDue===0}>
          {deckDue>0 ? `Start session · ${deckDue} words due` : "All done for today — come back tomorrow!"}
        </button>
      </div>
    );
  }

  /* ────── WORD PICKER ────── */
  if (screen==="wordpicker") {
    const lvVocab = activeLevel===1 ? VOCAB_A1 : VOCAB_A2;
    const lvColor = activeLevel===1 ? "var(--accent)" : "var(--accent2)";
    const selectedCount = lvVocab.filter(w=>enabledIds.includes(w.id)).length;
    const toggleWord = (id) => setEnabledIds(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev,id]);
    const selectAll = () => setEnabledIds(prev => [...new Set([...prev,...lvVocab.map(w=>w.id)])]);
    const deselectAll = () => setEnabledIds(prev => prev.filter(id=>!lvVocab.find(w=>w.id===id)));
    const q = pickerSearch.toLowerCase().trim();
    const filtered = q
      ? lvVocab.filter(w => w.sv.toLowerCase().includes(q) || w.en.toLowerCase().includes(q) || w.pos.toLowerCase().includes(q))
      : lvVocab;
    return (
      <div className="container fadein" style={{paddingTop:32, paddingBottom:72, display:"flex", flexDirection:"column", gap:16}}>
        <div style={{display:"flex", alignItems:"center", gap:12}}>
          <button className="btn-ghost" onClick={()=>{setScreen("level");setPickerSearch("");}} style={{fontSize:18, padding:0}}>←</button>
          <div style={{flex:1}}>
            <div style={{fontFamily:"var(--serif)", fontSize:20, fontWeight:600}}>Create your deck</div>
            <div style={{fontSize:13, color:"var(--muted)"}}>{selectedCount} of {lvVocab.length} selected</div>
          </div>
          <div style={{display:"flex", gap:10}}>
            <button className="btn-ghost" onClick={selectAll} style={{fontSize:12}}>All</button>
            <button className="btn-ghost" onClick={deselectAll} style={{fontSize:12}}>None</button>
          </div>
        </div>

        {/* Search box */}
        <div style={{position:"relative"}}>
          <input
            value={pickerSearch}
            onChange={e=>setPickerSearch(e.target.value)}
            placeholder="Search words… e.g. 'verb' or 'hej'"
            style={{width:"100%", border:"1px solid var(--border)", borderRadius:8, padding:"10px 36px 10px 14px", fontFamily:"var(--sans)", fontSize:14, background:"#fff", color:"var(--text)", outline:"none"}}
            onFocus={e=>e.target.style.borderColor=lvColor}
            onBlur={e=>e.target.style.borderColor="var(--border)"}
          />
          {pickerSearch && (
            <button onClick={()=>setPickerSearch("")}
              style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",color:"var(--muted)",fontSize:16,padding:0,cursor:"pointer"}}>
              ×
            </button>
          )}
        </div>

        {/* Results count when searching */}
        {q && <p style={{fontSize:12,color:"var(--muted)"}}>{filtered.length} word{filtered.length!==1?"s":""} found</p>}

        <div className="card" style={{padding:"8px 0"}}>
          {filtered.length === 0
            ? <div style={{padding:"20px",textAlign:"center",fontSize:14,color:"var(--muted)"}}>No words match your search</div>
            : filtered.map((w,i)=>(
              <div key={w.id} style={{display:"flex", alignItems:"center", gap:12, padding:"10px 20px", borderBottom:i<filtered.length-1?"1px solid var(--border)":"none", cursor:"pointer"}}
                onClick={()=>toggleWord(w.id)}>
                <div style={{flex:1}}>
                  <span style={{fontFamily:"var(--serif)", fontSize:16}}>{w.sv}</span>
                  <span style={{fontSize:13, color:"var(--muted)", marginLeft:10}}>{w.en}</span>
                </div>
                <span style={{fontSize:11, color:"var(--muted)", marginRight:8, textTransform:"capitalize"}}>{w.pos}</span>
                <button className={`toggle-btn ${enabledIds.includes(w.id)?"on":"off"}`}
                  onClick={e=>{e.stopPropagation();toggleWord(w.id);}} />
              </div>
            ))
          }
        </div>
        <button className="btn-primary" style={{background:lvColor}} onClick={()=>{setScreen("level");setPickerSearch("");}}>Save & go back</button>
      </div>
    );
  }

  /* ────── STUDY ────── */
  if (screen==="study" && current) {
    const posColor = POS_COLOR[current.pos]||"var(--muted)";
    const progress = ((idx+1)/session.length)*100;
    const lvColor = current.cefr===1 ? "var(--accent)" : "var(--accent2)";
    return (
      <div className="container fadein" style={{paddingTop:32, paddingBottom:72, display:"flex", flexDirection:"column", gap:20}}>
        <div style={{display:"flex", alignItems:"center", gap:12}}>
          <button className="btn-ghost" onClick={()=>setScreen("level")} style={{fontSize:18, padding:0}}>←</button>
          <div className="progress-track" style={{flex:1}}>
            <div style={{height:"100%", background:lvColor, borderRadius:999, width:`${progress}%`, transition:"width .4s ease"}}/>
          </div>
          <span style={{fontSize:12, color:"var(--muted)", minWidth:36, textAlign:"right"}}>{idx+1}/{session.length}</span>
        </div>

        <div style={{display:"flex", gap:8, alignItems:"center"}}>
          <span className="badge" style={{color:posColor, borderColor:posColor}}>{current.pos}</span>
          <span style={{fontSize:11, background:current.cefr===1?"#fdf0ee":"#edf7f0", color:lvColor, padding:"2px 8px", borderRadius:999, fontWeight:600}}>
            {current.cefr===1?"A1":"A2"}
          </span>
        </div>

        {/* FLASHCARD */}
        {mode==="flashcard" && <>
          <div className="flip-wrap" onClick={()=>setFlipped(f=>!f)} style={{cursor:"pointer"}}>
            <div className={`flip-inner${flipped?" flipped":""}`}>
              <div className="flip-face">
                <div style={{fontFamily:"var(--serif)", fontSize:44, fontWeight:600}}>{current.sv}</div>
                <button onClick={e=>{e.stopPropagation();speakWord(current.sv);}} style={{marginTop:14,background:"none",border:"1px solid var(--border)",borderRadius:999,padding:"4px 14px",fontSize:12,color:"var(--muted)",cursor:"pointer"}}>🔊 replay</button>
                <div style={{fontSize:12, color:"var(--muted)", marginTop:10}}>tap to reveal</div>
              </div>
              <div className="flip-face flip-back">
                <div style={{fontFamily:"var(--serif)", fontSize:34, fontWeight:600, color:lvColor}}>{current.en}</div>
                {current.synonyms&&current.synonyms.length>0&&
                  <div style={{fontSize:12, color:"var(--muted)", marginTop:8}}>also: {current.synonyms.slice(0,3).join(", ")}</div>}
              </div>
            </div>
          </div>
          {!flipped
            ? <button className="btn-primary" style={{background:lvColor}} onClick={()=>setFlipped(true)}>Show translation</button>
            : <>
                <p className="hint-text" style={{textAlign:"center"}}>Did you know this word?</p>
                <div className="know-btns">
                  <button className="know-btn yes" onClick={()=>applyQ(4)}>✓ I knew it</button>
                  <button className="know-btn no"  onClick={()=>applyQ(1)}>✗ Not yet</button>
                </div>
              </>
          }
        </>}

        {/* QUIZ */}
        {mode==="quiz" && <>
          <div className="card" style={{minHeight:160, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:12}}>
            <div style={{fontFamily:"var(--serif)", fontSize:44, fontWeight:600}}>{current.sv}</div>
            <button onClick={()=>speakWord(current.sv)} style={{background:"none",border:"1px solid var(--border)",borderRadius:999,padding:"4px 14px",fontSize:12,color:"var(--muted)",cursor:"pointer"}}>🔊 replay</button>
          </div>
          <div className="quiz-options">
            {quizOpts.map((opt,i)=>{
              const isRight=opt===current.en, isSel=opt===quizAnswer;
              let cls="quiz-opt";
              if (quizAnswer) cls+=isRight?" correct":isSel?" wrong":"";
              return (
                <button key={i} className={cls} onClick={()=>{
                  if(quizAnswer) return;
                  setQuizAnswer(opt);
                  setTimeout(()=>applyQ(isRight?4:1),800);
                }}>
                  {opt}{quizAnswer&&isRight?" ✓":""}{isSel&&!isRight?" ✗":""}
                </button>
              );
            })}
          </div>
        </>}

        {/* TYPING */}
        {mode==="typing" && <>
          <div className="card" style={{minHeight:160, display:"flex", alignItems:"center", justifyContent:"center"}}>
            <div style={{fontFamily:"var(--serif)", fontSize:44, fontWeight:600}}>{current.sv}</div>
          </div>
          {/* FIX: hint hidden by default */}
          {!showHint
            ? <button className="btn-ghost" onClick={()=>setShowHint(true)} style={{fontSize:12}}>Need a hint?</button>
            : <p className="hint-text" style={{cursor:"pointer"}} onClick={()=>setShowHint(false)}>First letter: {hintText(current.en)} <span style={{color:"var(--muted)", fontSize:11}}>(tap to hide)</span></p>
          }
          <div style={{display:"flex", gap:10}}>
            <input ref={inputRef} autoFocus
              className={`type-input${typeResult?" "+typeResult:""}`}
              value={typeVal} onChange={e=>setTypeVal(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")handleType();}}
              disabled={!!typeResult}
              placeholder="Type the English translation…"
            />
            <button className="btn-primary" onClick={handleType} disabled={!!typeResult} style={{width:"auto", padding:"0 18px", background:lvColor}}>→</button>
          </div>
          {typeResult&&(
            <div className="card pop" style={{textAlign:"center", borderColor:typeResult==="correct"?"var(--accent2)":"var(--accent)"}}>
              <p style={{color:typeResult==="correct"?"var(--accent2)":"var(--accent)", fontSize:15, fontWeight:500}}>
                {typeResult==="correct"?"✓ Correct!":`✗ The answer is: ${current.en}`}
              </p>
              {typeResult==="correct"&&current.synonyms&&current.synonyms.length>0&&
                <p style={{fontSize:12, color:"var(--muted)", marginTop:4}}>Also accepted: {current.synonyms.slice(0,3).join(", ")}</p>}
            </div>
          )}
        </>}

        {/* Example sentence */}
        <div>
          <button className="btn-ghost" onClick={loadAi} style={{fontSize:13}}>✦ Show example sentence</button>
          {aiText&&(
            <div className="ai-hint" style={{marginTop:8}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8}}>
                <span>{aiText}</span>
                <button onClick={()=>speakWord(aiText.split(" — ")[0])} style={{background:"none",border:"none",fontSize:14,cursor:"pointer",color:"var(--muted)",flexShrink:0}}>🔊</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ────── DONE ────── */
  if (screen==="done") {
    const t=sessionStats.correct+sessionStats.wrong;
    const acc=t>0?Math.round((sessionStats.correct/t)*100):0;
    const lvColor=activeLevel===1?"var(--accent)":"var(--accent2)";
    // use finalCards (freshly updated) so learned/mastered counts are accurate
    const fc = finalCards || cards;
    const fcLevelCards = fc.filter(c=>c.cefr===activeLevel);
    const fcLearned = fcLevelCards.filter(c=>c.repetitions>=2).length;
    const fcMastered = fcLevelCards.filter(c=>c.repetitions>=5).length;
    const fcReviewed = fcLevelCards.filter(c=>c.totalReviews>0).length;
    const lvTotal = fcLevelCards.length;
    const lvPct = Math.round((fcReviewed/lvTotal)*100);
    const moreAvailable = getSession(fc, lastDeckIds, false).length > 0 || lastDeckIds.length > 0;
    return (
      <div className="container fadein" style={{paddingTop:48, paddingBottom:72, display:"flex", flexDirection:"column", gap:24}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:52, marginBottom:12}}>{doneMsg.emoji}</div>
          <h2 style={{fontFamily:"var(--serif)", fontSize:30}}>{doneMsg.title}</h2>
          <p style={{color:"var(--muted)", marginTop:6}}>{doneMsg.sub}</p>
        </div>
        <div className="card" style={{textAlign:"center"}}>
          <div style={{fontFamily:"var(--serif)", fontSize:40, color:acc>=70?"var(--accent2)":"var(--accent)", fontWeight:600}}>{acc}%</div>
          <div style={{fontSize:13, color:"var(--muted)", marginTop:4}}>accuracy this session</div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginTop:16}}>
            <div><div style={{fontSize:24,fontFamily:"var(--serif)",color:"var(--accent2)"}}>{sessionStats.correct}</div><div style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".06em"}}>Correct</div></div>
            <div><div style={{fontSize:24,fontFamily:"var(--serif)",color:"var(--accent)"}}>{sessionStats.wrong}</div><div style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".06em"}}>To review</div></div>
          </div>
        </div>
        <div className="card">
          <div style={{display:"flex", justifyContent:"space-between", fontSize:13, color:"var(--muted)", marginBottom:8}}>
            <span>A{activeLevel} words reviewed</span><span>{fcReviewed}/{lvTotal}</span>
          </div>
          <div className="progress-track" style={{height:8}}>
            <div style={{height:"100%",background:lvColor,borderRadius:999,width:`${lvPct}%`,transition:"width .4s ease"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:10,fontSize:12,color:"var(--muted)"}}>
            <span>⭐ {fcLearned} learned</span>
            <span>🏆 {fcMastered} mastered</span>
          </div>
        </div>
        {sessionLog.length>0&&(
          <div className="card">
            <p style={{fontSize:12,color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:12}}>This session</p>
            {sessionLog.map((w,i)=>(
              <div className="word-row" key={i}>
                <span className="word-sv">{w.sv}</span>
                <span style={{color:"var(--muted)",fontSize:13,flex:1,padding:"0 12px"}}>{w.en}</span>
                <span className={`word-pill ${w.correct?"pill-correct":"pill-wrong"}`}>{w.correct?"✓ knew it":"✗ missed"}</span>
              </div>
            ))}
          </div>
        )}
        <div style={{display:"flex", gap:12}}>
          <button className="btn-outline" style={{flex:1}} onClick={()=>setScreen("home")}>← Home</button>
          <button className="btn-primary" style={{flex:1,background:lvColor}} onClick={()=>startSession(mode, lastDeckIds)}>
            Practise again →
          </button>
        </div>
        <button className="btn-ghost" style={{textAlign:"center"}}
          onClick={()=>startSession(mode, lastDeckIds, true)}>
          Keep practising (ignore schedule) →
        </button>
      </div>
    );
  }

  /* ────── STATS ────── */
  if (screen==="stats") {
    const byPos=cards.reduce((acc,c)=>{if(!acc[c.pos])acc[c.pos]={total:0,learned:0};acc[c.pos].total++;if(c.repetitions>=2)acc[c.pos].learned++;return acc;},{});
    const hardest=[...cards].filter(c=>c.totalReviews>0).sort((a,b)=>(a.correctCount/a.totalReviews)-(b.correctCount/b.totalReviews)).slice(0,5);
    const allAcc=cards.filter(c=>c.totalReviews>0);
    const avg=allAcc.length?Math.round(allAcc.reduce((s,c)=>s+c.correctCount/c.totalReviews,0)/allAcc.length*100):0;
    function retentionScore(card) {
      if (!card.nextReview||card.totalReviews===0) return null;
      const now=Date.now();
      if (now>=card.nextReview) return 0;
      const intervalMs=card.interval*86400000;
      const elapsed=now-(card.nextReview-intervalMs);
      return Math.max(0,Math.round(100*(1-elapsed/intervalMs)));
    }
    const retentionScores=cards.filter(c=>c.totalReviews>0).map(c=>({...c,retention:retentionScore(c)})).filter(c=>c.retention!==null);
    const overallRetention=retentionScores.length?Math.round(retentionScores.reduce((s,c)=>s+c.retention,0)/retentionScores.length):null;
    const retColor=overallRetention>=70?"var(--accent2)":overallRetention>=40?"var(--warn)":"var(--accent)";

    return (
      <div className="container fadein" style={{paddingTop:40, paddingBottom:72, display:"flex", flexDirection:"column", gap:24}}>
        <div style={{display:"flex", alignItems:"center", gap:12}}>
          <button className="btn-ghost" onClick={()=>setScreen("home")} style={{fontSize:18,padding:0}}>←</button>
          <h2 style={{fontFamily:"var(--serif)", fontSize:28}}>Statistics</h2>
        </div>

        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
          {[["Total words",total,"var(--text)"],["Due today",dueCount,"var(--accent)"],["Reviewed",reviewed,"var(--text)"],["Learned",learned,"var(--accent2)"],["Mastered",mastered,"var(--muted)"]].map(([l,v,c])=>(
            <div className="stat-tile" key={l}><div className="stat-num" style={{color:c}}>{v}</div><div className="stat-label">{l}</div></div>
          ))}
        </div>

        <div className="card" style={{display:"flex",flexDirection:"column",gap:14}}>
          <p style={{fontSize:12,color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase"}}>By level</p>
          {[{lv:1,label:"A1 Beginner",color:"var(--accent)"},{lv:2,label:"A2 Elementary",color:"var(--accent2)"}].map(({lv,label,color})=>{
            const lc=levelCards(lv), ll=levelLearned(lv);
            return (
              <div key={lv}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                  <span style={{fontWeight:500}}>{label}</span><span style={{color:"var(--muted)"}}>{ll}/{lc.length}</span>
                </div>
                <div className="progress-track"><div style={{height:"100%",background:color,borderRadius:999,width:`${Math.round(ll/lc.length*100)}%`,transition:"width .4s ease"}}/></div>
              </div>
            );
          })}
        </div>

        {overallRetention!==null&&(
          <div className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
              <div>
                <div style={{fontSize:14,fontWeight:500}}>Retention score</div>
                <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>How much you actually remember right now, accounting for when you last reviewed each word</div>
              </div>
              <div style={{fontFamily:"var(--serif)",fontSize:32,fontWeight:600,color:retColor,marginLeft:16,flexShrink:0}}>{overallRetention}%</div>
            </div>
            <div className="progress-track" style={{height:8,marginTop:12}}>
              <div style={{height:"100%",background:retColor,borderRadius:999,width:`${overallRetention}%`,transition:"width .4s ease"}}/>
            </div>
            <div style={{fontSize:12,color:"var(--muted)",marginTop:8}}>
              {overallRetention>=80?"Excellent — your vocabulary is fresh and solid!":
               overallRetention>=60?"Good — a few words are starting to fade, keep reviewing!":
               overallRetention>=40?"Some words need attention — try a session today.":
               "Your vocabulary needs a refresh — time to practise!"}
            </div>
          </div>
        )}

        {retentionScores.length>0&&(
          <div className="card" style={{display:"flex",flexDirection:"column"}}>
            <p style={{fontSize:12,color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:12}}>Word retention</p>
            {[...retentionScores].sort((a,b)=>a.retention-b.retention).map(c=>{
              const r=c.retention;
              const col=r>=70?"var(--accent2)":r>=40?"var(--warn)":"var(--accent)";
              return (
                <div key={c.id} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
                    <span style={{fontFamily:"var(--serif)"}}>{c.sv}</span>
                    <span style={{color:"var(--muted)"}}>{c.en}</span>
                    <span style={{color:col,fontWeight:500,minWidth:36,textAlign:"right"}}>{r}%</span>
                  </div>
                  <div className="progress-track" style={{height:4}}>
                    <div style={{height:"100%",background:col,borderRadius:999,width:`${r}%`,transition:"width .4s ease"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontSize:14,color:"var(--muted)"}}>Average accuracy</span>
            <span style={{fontFamily:"var(--serif)",fontSize:20,color:"var(--accent)"}}>{avg}%</span>
          </div>
          <div className="progress-track" style={{height:7}}><div className="progress-fill" style={{width:`${avg}%`}}/></div>
        </div>

        <div className="card" style={{display:"flex",flexDirection:"column",gap:12}}>
          <p style={{fontSize:12,color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase"}}>By word type</p>
          {Object.entries(byPos).sort((a,b)=>b[1].total-a[1].total).map(([pos,{total:t,learned:l}])=>(
            <div key={pos}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                <span style={{textTransform:"capitalize"}}>{pos}</span><span style={{color:"var(--muted)"}}>{l}/{t}</span>
              </div>
              <div className="progress-track"><div className="progress-fill" style={{width:`${(l/t)*100}%`}}/></div>
            </div>
          ))}
        </div>

        {hardest.length>0&&(
          <div className="card" style={{display:"flex",flexDirection:"column"}}>
            <p style={{fontSize:12,color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:12}}>Hardest words</p>
            {hardest.map(c=>(
              <div className="word-row" key={c.id}>
                <span className="word-sv">{c.sv}</span>
                <span style={{color:"var(--muted)",fontSize:13,flex:1,padding:"0 10px"}}>{c.en}</span>
                <span style={{fontSize:13,color:"var(--accent)"}}>{Math.round(c.correctCount/c.totalReviews*100)}%</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
